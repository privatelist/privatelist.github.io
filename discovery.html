<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery - Real Insights</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1.1rem;
            color: #aaa;
        }

        .form-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #ccc;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.5;
            resize: vertical;
            min-height: 100px;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: rgba(100, 200, 255, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #64c8ff 0%, #0099ff 100%);
            color: #000;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 153, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .synthesis-section {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
        }

        .synthesis-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .thinking-container {
            text-align: center;
            padding: 40px 20px;
        }

        .thinking-text {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 20px;
        }

        .thinking-animation {
            display: inline-block;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #64c8ff;
            margin: 0 4px;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .clarity-section {
            margin-top: 20px;
        }

        .clarity-section p {
            margin-bottom: 16px;
            line-height: 1.7;
            color: #e0e0e0;
            font-size: 1rem;
        }

        .clarity-section p:last-child {
            margin-bottom: 0;
        }

        .error-message {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            color: #ffcccc;
        }

        .fallback-message {
            background: rgba(100, 200, 100, 0.1);
            border: 1px solid rgba(100, 200, 100, 0.3);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            color: #ccffcc;
            font-style: italic;
        }

        .success-checkmark {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #64c8ff;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }

            .form-section,
            .synthesis-section {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Discovery</h1>
            <p>Four questions. Real insights.</p>
        </header>

        <form class="form-section" id="discoveryForm">
            <div class="form-group">
                <label for="q1">What brought you here?</label>
                <textarea id="q1" placeholder="Tell us what's on your mind..." required></textarea>
            </div>

            <div class="form-group">
                <label for="q2">What have you tried so far?</label>
                <textarea id="q2" placeholder="What's already on the table..." required></textarea>
            </div>

            <div class="form-group">
                <label for="q3">What's the real obstacle?</label>
                <textarea id="q3" placeholder="What's actually stopping you..." required></textarea>
            </div>

            <div class="form-group">
                <label for="q4">What would change?</label>
                <textarea id="q4" placeholder="If this shifted, what would be different..." required></textarea>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary" id="synthesizeBtn">Get Clarity</button>
                <button type="reset" class="btn-secondary">Clear</button>
            </div>
        </form>

        <div class="synthesis-section" id="synthesisSection">
            <div class="section-title">Your Clarity</div>
            <div id="synthesisContent"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('discoveryForm');
        const synthesisSection = document.getElementById('synthesisSection');
        const synthesisContent = document.getElementById('synthesisContent');
        const synthesizeBtn = document.getElementById('synthesizeBtn');

        // Configuration
        const API_URL = 'http://206.189.169.142/api/synthesize';

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const q1 = document.getElementById('q1').value.trim();
            const q2 = document.getElementById('q2').value.trim();
            const q3 = document.getElementById('q3').value.trim();
            const q4 = document.getElementById('q4').value.trim();

            // Validate
            if (!q1 || !q2 || !q3 || !q4) {
                showError('Please fill in all four fields.');
                return;
            }

            // Show thinking state
            showThinking();

            try {
                // Call the API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ q1, q2, q3, q4 }),
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    // Display the real synthesis
                    displaySynthesis(data.synthesis);
                } else {
                    throw new Error('Synthesis failed');
                }
            } catch (error) {
                console.error('Synthesis error:', error);
                // Fallback: API is down or unreachable
                showFallback();
            }
        });

        function showThinking() {
            synthesisSection.classList.add('active');
            synthesisContent.innerHTML = `
                <div class="thinking-container">
                    <div class="thinking-text">Processing what you told me...</div>
                    <div class="thinking-animation">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>
            `;
            synthesizeBtn.disabled = true;
        }

        function displaySynthesis(html) {
            synthesisContent.innerHTML = html;
            synthesizeBtn.disabled = false;
        }

        function showError(message) {
            synthesisSection.classList.add('active');
            synthesisContent.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
            synthesizeBtn.disabled = false;
        }

        function showFallback() {
            synthesisSection.classList.add('active');
            synthesisContent.innerHTML = `
                <div class="fallback-message">
                    <div class="success-checkmark">✓</div>
                    <p>We captured your answers — our team will follow up with real insights shortly.</p>
                </div>
            `;
            synthesizeBtn.disabled = false;
        }

        // Initial state
        synthesisSection.classList.remove('active');
    </script>
</body>
</html>
